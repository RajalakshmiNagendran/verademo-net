trigger:
  - main

pool:
  name: 'azureagent'

variables:
  buildConfiguration: 'Release'

steps:

  - task: DotNetCoreCLI@2
    inputs:
      command: 'restore'
      projects: '**/*.sln'
      feedsToUse: 'select'
  - task: UseDotNet@2
    inputs:
      version: '8.x'
      includePreviewVersions: true
  - task: DotNetCoreCLI@2
    displayName: Build
    inputs:
      command: build
      projects: '**/*.csproj'
      arguments: '--configuration $(buildConfiguration)'