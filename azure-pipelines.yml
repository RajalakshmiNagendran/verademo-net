trigger:
- veracode-upload-and-scan

pool:
  name: 'azureagent'

steps:
# Step 1: Package Binaries
- task: CmdLine@2
  displayName: Package Artifacts
  inputs:
    script: |
      curl -fsS https://tools.veracode.com/veracode-cli/install | sh
      ./veracode package --source $(Build.SourcesDirectory) --output $(Build.ArtifactStagingDirectory)/artifacts --trust

#step 2: Extract files
- task: ExtractFiles@1
  inputs:
    archiveFilePatterns: '$(Build.ArtifactStagingDirectory)/artifacts/*.zip' # string. Required. Archive file patterns. Default: **/*.zip.
    destinationFolder: '$(Build.ArtifactStagingDirectory)'

# Step 3: Download the pipeline Artifiact
- task: DownloadPipelineArtifact@2
  displayName: Download Packaged Binaries
  inputs:
    buildType: 'current'
    artifact: 'packaged-binaries'
    path: '$(Pipeline.Workspace)'

#scan the artifact with veracode upload and scan
- task: Veracode@3
  inputs:
    ConnectionDetailsSelection: 'Service Connection'
    AnalysisService: 'veracodeservice'
    veracodeAppProfile: '$(system.teamProject)'
    version: '$(build.buildNumber)'
    filepath: '$(Pipeline.Workspace)'
    createProfile: false
    failBuildIfUploadAndScanBuildStepFails: true
    importResults: true
    maximumWaitTime: '360'