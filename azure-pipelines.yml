trigger:
- main  

pool:
  name: 'azureagent'

steps:
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '6.x'
    installationPath: $(Agent.ToolsDirectory)/dotnet

- script: |
    dotnet restore   # Restore the dependencies
    dotnet build     # Build the application
  displayName: 'Restore and Build'

- script: |
    dotnet publish -c Release -o $(Build.ArtifactStagingDirectory)  # Publish the app
  displayName: 'Publish'

- publish: $(Build.ArtifactStagingDirectory)  # Publish build artifacts
  artifact: drop
  displayName: 'Publish Artifact'