trigger:
- main

pool:
  name: 'azureagent'

steps:
# Step 1: Package Binaries
- task: CmdLine@2
  displayName: Package Artifacts
  inputs:
    script: |
      curl -fsS https://tools.veracode.com/veracode-cli/install | sh
      ./veracode package --source $(Build.SourcesDirectory) --output $(Build.ArtifactStagingDirectory)/artifacts --trust

# Step 2: Archive Packaged Binaries
- task: ArchiveFiles@2
  displayName: Archive Packaged Binaries
  inputs:
    rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/artifacts'
    includeRootFolder: true
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
    replaceExistingArchive: true

# Publish (upload) a file or directory as a named artifact for the current run.
- task: PublishPipelineArtifact@1
  inputs:
    artifactName: 'build-output'
    targetPath: '$(Build.ArtifactStagingDirectory)'
    publishLocation: 'pipeline'

# Download build and pipeline artifacts.
- task: DownloadPipelineArtifact@2
  inputs:
    buildType: 'current'
    artifactName: 'build-output'
    targetPath: '$(Pipeline.Workspace)'

# Step 5: Scan the ZIP File with Veracode upload and scan
- task: Veracode@3
  inputs:
    ConnectionDetailsSelection: 'Service Connection' # access Veracode with service connection or Veracode API credentials
    AnalysisService: 'veracodeservice' # service connection name for accessing Veracode
    veracodeAppProfile: '$(system.teamProject)' # Veracode application profile to scan
    version: '$(build.buildNumber)' # name of the scan to run
    filepath: '$(Pipeline.Workspace)' # filepath or folderpath of files to upload to Veracode
    createProfile: false # false to enforce using existing profiles
    failBuildIfUploadAndScanBuildStepFails: false # true to fail build if Upload and Scan task fails to start
    importResults: true # required to view Veracode results in Azure DevOps
    failBuildOnPolicyFail: false # true to fail the build if application fails policy
    maximumWaitTime: '360'