trigger:
  - main

pool:
  name: 'azureagent'

steps:
  - task: UseDotNet@2
    inputs:
      version: '8.x'
      includePreviewVersions: true

  - task: DotNetCoreCLI@2
    displayName: Build
    inputs:
      command: build
      projects: '**/*.csproj'
      arguments: '--configuration $(buildConfiguration)'
  